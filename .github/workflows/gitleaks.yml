name: gitleaks

# Secret scanning via the gitleaks OSS binary (no org license required).
# gitleaks-action v2/v3 needs a paid org license; the OSS binary does not.
# Allow-list lives in .gitleaks.toml (extends the built-in default rules).

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '7 1 * * *'   # nightly 01:07 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install gitleaks OSS binary (pinned + checksum-verified)
        run: |
          set -euo pipefail
          GITLEAKS_VER=8.21.2
          GITLEAKS_SHA=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm -f gitleaks.tar.gz
          gitleaks version
      - name: Gitleaks scan (OSS binary, no license required)
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --log-opts "--all" \
            --redact \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --no-banner \
            || exit 1
