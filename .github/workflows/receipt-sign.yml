#
# Mint a GENUINE Sigstore keyless DSSE signature over a yarqa provenance receipt
# and independently verify it (Fulcio ephemeral ECDSA-P256 cert + Rekor inclusion
# proof + DSSE signature), then reproduce the run from the authenticated replay
# recipe. This is live, third-party-checkable evidence that yarqa receipt signing
# is REAL -- not a placeholder.
#
# HONESTY: this upgrades the receipt SIGNATURE only. yarqa stays an
# engineering-method/CFD tier (receipts attest integrity + reproducibility, not
# correctness); the SLSA claim is unchanged (L1). Outside CI there is no ambient
# OIDC token, so every other runtime keeps the honest placeholder.
#
# Org policy permits only github-owned / verified actions, so Sigstore signing is
# driven by `pip install sigstore` + the repo's own scripts.

name: Receipt Sign (Sigstore keyless)

on:
  push:
    branches: [master]
    paths:
      - "yarqa/**"
      - "scripts/sign_receipt.py"
      - "scripts/verify_receipt.py"
      - "tests/test_signing.py"
      - ".github/workflows/receipt-sign.yml"
  pull_request:
    branches: [master]
    paths:
      - "yarqa/**"
      - "scripts/sign_receipt.py"
      - "scripts/verify_receipt.py"
      - "tests/test_signing.py"
      - ".github/workflows/receipt-sign.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sign-and-verify:
    name: Sign + independently verify a yarqa receipt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # publish the signed receipt to the ledger branch (push:master only)
      id-token: write   # REQUIRED: the ambient OIDC token Fulcio exchanges for a cert
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install yarqa + sigstore
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install "sigstore>=2.0.0" "pytest>=7"

      - name: Offline self-test (no signature)
        run: python -m pytest -q tests/test_signing.py

      - name: Sign a yarqa receipt (real Sigstore keyless)
        run: python scripts/sign_receipt.py --nx 12 --ny 8 --seed 0

      - name: Locate signed envelope
        id: locate
        run: |
          envelope="$(ls attestations/yarqa/*.dsse.json | head -n1)"
          echo "envelope=${envelope}" >> "$GITHUB_OUTPUT"
          echo "Signed envelope: ${envelope}"

      - name: Independently verify (Fulcio + Rekor + DSSE) and reproduce the run
        run: |
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/receipt-sign.yml@${GITHUB_REF}"
          echo "Expected signer identity: ${identity}"
          python scripts/verify_receipt.py "${{ steps.locate.outputs.envelope }}" \
            --identity "${identity}" \
            --issuer "https://token.actions.githubusercontent.com" \
            --replay

      - name: Upload signed receipt as evidence
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: yarqa-dsse-receipt
          path: attestations/yarqa/*.dsse.json
          if-no-files-found: error

      - name: Publish signed receipt to ledger branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          ENVELOPE: ${{ steps.locate.outputs.envelope }}
        with:
          script: |
            const fs = require('fs');
            const branch = 'governance-receipts';
            const { owner, repo } = context.repo;
            const envelope = JSON.parse(fs.readFileSync(process.env.ENVELOPE, 'utf8'));
            if (envelope._mode !== 'SIGSTORE-KEYLESS') {
              core.info(`Envelope mode is '${envelope._mode}', not a real signature -- not publishing.`);
              return;
            }
            envelope._signer_identity = `https://github.com/${owner}/${repo}/.github/workflows/receipt-sign.yml@${context.ref}`;
            envelope._signer_issuer = 'https://token.actions.githubusercontent.com';

            // ensure the append-only ledger branch exists (branch from default on first use)
            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            } catch (e) {
              const meta = await github.rest.repos.get({ owner, repo });
              const defRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${meta.data.default_branch}` });
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: defRef.data.object.sha });
              core.info(`Created ledger branch ${branch}`);
            }

            const ledgerPath = `receipts/${envelope._szl.receipt_sha256}.dsse.json`;
            const content = Buffer.from(JSON.stringify(envelope, null, 2)).toString('base64');
            let existingSha;
            try {
              const cur = await github.rest.repos.getContent({ owner, repo, path: ledgerPath, ref: branch });
              existingSha = cur.data.sha;
            } catch (e) { /* new file */ }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: ledgerPath, branch,
              message: `receipt: publish signed yarqa receipt ${envelope._szl.receipt_sha256.slice(0, 12)}`,
              content, sha: existingSha,
            });
            core.info(`Published ${ledgerPath} to ${branch}`);
