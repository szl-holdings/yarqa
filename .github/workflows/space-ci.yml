# CI for the yarqa package + Space endpoints. Actions are SHA-pinned.
name: Space CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.1.7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-python@v5.1.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r space/requirements.txt pytest httpx
      - name: Package tests
        run: pytest tests/ -q
      - name: Space endpoint tests
        run: pytest space/tests/test_space_endpoints.py -q
      - name: Verify vendored THREE is r160 (sovereign, zero CDN)
        run: |
          grep -q "REVISION = '160'" space/static/lib/three.min.js
          ! grep -riE "https?://(cdn|unpkg|cdnjs|jsdelivr|esm\.sh)" space/static/index.html space/static/js

  container-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ env.SOURCE_SHA }}
      - name: Build the digest-pinned and dependency-locked Space image
        run: docker build --pull -f space/Dockerfile -t yarqa-space-pr:${SOURCE_SHA} .
      - name: Exercise HF UID, offline liveness, health contract, and unknown-route 404
        env:
          IMAGE: yarqa-space-pr:${{ env.SOURCE_SHA }}
        run: |
          set -euo pipefail
          name="yarqa-space-pr-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          offline="${name}-offline"
          cleanup() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ]; then
              docker logs "$name" 2>/dev/null || true
              docker logs "$offline" 2>/dev/null || true
            fi
            docker rm -f "$name" "$offline" >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT

          docker run --rm -d --network none --name "$offline" "$IMAGE"
          test "$(docker exec "$offline" id -u)" = 1000
          docker exec -i "$offline" python - <<'PY'
          import json
          import time
          import urllib.request

          deadline = time.monotonic() + 90
          while time.monotonic() < deadline:
              try:
                  with urllib.request.urlopen("http://127.0.0.1:7860/livez", timeout=2) as response:
                      body = json.load(response)
                  if body.get("ok") is True and body.get("check") == "liveness":
                      break
              except (OSError, ValueError):
                  pass
              time.sleep(1)
          else:
              raise SystemExit("offline /livez did not satisfy the liveness contract")
          PY

          docker run --rm -d --name "$name" -p 7860:7860 "$IMAGE"
          test "$(docker exec "$name" id -u)" = 1000
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request

          liveness = "http://127.0.0.1:7860/livez"
          deadline = time.monotonic() + 90
          while time.monotonic() < deadline:
              try:
                  with urllib.request.urlopen(liveness, timeout=2) as response:
                      body = json.load(response)
                  if body.get("ok") is True and body.get("check") == "liveness":
                      break
              except (OSError, ValueError):
                  pass
              time.sleep(1)
          else:
              raise SystemExit("/livez did not satisfy the Yarqa contract")

          with urllib.request.urlopen("http://127.0.0.1:7860/healthz", timeout=45) as response:
              health = json.load(response)
          if health.get("ok") is not True or health.get("service") != "yarqa-space":
              raise SystemExit("/healthz did not satisfy the source-of-truth contract")

          try:
              urllib.request.urlopen("http://127.0.0.1:7860/definitely-missing", timeout=3)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              raise SystemExit("unknown route did not return 404")
          PY
          for _ in $(seq 1 45); do
            status="$(docker inspect -f '{{.State.Health.Status}}' "$name")"
            if [ "$status" = healthy ]; then
              break
            fi
            if [ "$status" = unhealthy ]; then
              docker logs "$name"
              exit 1
            fi
            sleep 1
          done
          test "$(docker inspect -f '{{.State.Health.Status}}' "$name")" = healthy
