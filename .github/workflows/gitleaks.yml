name: gitleaks

# Secret scanning via the gitleaks OSS binary (no org license required).
# gitleaks-action v2/v3 needs a paid org license; the OSS binary does not.
# Allow-list lives in .gitleaks.toml (extends the built-in default rules).

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '7 1 * * *'   # nightly 01:07 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install gitleaks OSS binary
        run: |
          set -euo pipefail
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Gitleaks scan (OSS binary, no license required)
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --log-opts "--all" \
            --redact \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks-report.sarif \
            --no-banner \
            || exit 1
