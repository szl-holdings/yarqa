name: DCO

# Verifies Developer Certificate of Origin sign-off.
# On PR: every commit must carry a Signed-off-by trailer.
# On push to the default branch: passes (squash merges are signed by GitHub).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Check DCO on PR commits
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Checking Signed-off-by on PR commits..."
          COMMITS=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits" --jq '.[].sha' 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            echo "No commits found — assuming OK"
            exit 0
          fi
          FAIL=0
          for sha in $COMMITS; do
            body=$(git log -1 --format="%B" "$sha" 2>/dev/null || echo "")
            if echo "$body" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "  OK: ${sha:0:12}"
            else
              echo "::error::Commit ${sha:0:12} is missing a Signed-off-by trailer."
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "Fix: add a sign-off trailer to each commit (amend or rebase with --signoff)."
            exit 1
          fi
          echo "All commits carry a valid Signed-off-by trailer."
      - name: DCO status (push/workflow_dispatch)
        if: github.event_name != 'pull_request'
        run: echo "Push/dispatch — commits gated via PR DCO + GitHub-signed squash merge. OK"
