name: PR Title (Conventional Commits)

# Lints the pull-request title against the Conventional Commits spec.
# Pure bash, zero third-party actions (so nothing to SHA-pin).

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  lint-title:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          echo "PR title: $PR_TITLE"
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._-]+\))?(!)?: .+'
          if echo "$PR_TITLE" | grep -qE "$pattern"; then
            echo "Title follows Conventional Commits."
          else
            echo "::error::PR title must follow Conventional Commits, e.g. 'ci: add standard SZL workflows'."
            echo "Allowed types: feat fix docs style refactor perf test build ci chore revert"
            exit 1
          fi
