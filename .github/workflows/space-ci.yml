# CI for the yarqa package + Space endpoints. Actions are SHA-pinned.
name: Space CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.1.7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-python@v5.1.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r space/requirements.txt pytest httpx
      - name: Package tests
        run: pytest tests/ -q
      - name: Space endpoint tests
        run: pytest space/tests/test_space_endpoints.py -q
      - name: Verify vendored THREE is r160 (sovereign, zero CDN)
        run: |
          grep -q "REVISION = '160'" space/static/lib/three.min.js
          ! grep -riE "https?://(cdn|unpkg|cdnjs|jsdelivr|esm\.sh)" space/static/index.html space/static/js

  container-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Build the exact pinned Space image
        run: docker build --pull -f space/Dockerfile -t yarqa-space-pr:${{ github.sha }} .
      - name: Exercise non-root runtime, health contract, and unknown-route 404
        env:
          IMAGE: yarqa-space-pr:${{ github.sha }}
        run: |
          set -euo pipefail
          name="yarqa-space-pr-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() { docker rm -f "$name" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker run --rm -d --name "$name" -p 7860:7860 "$IMAGE"
          test "$(docker exec "$name" id -u)" -ne 0
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request

          health = "http://127.0.0.1:7860/healthz"
          for _ in range(60):
              try:
                  with urllib.request.urlopen(health, timeout=3) as response:
                      body = json.load(response)
                  if body.get("ok") is True and body.get("service") == "yarqa-space":
                      break
              except (OSError, ValueError):
                  pass
              time.sleep(1)
          else:
              raise SystemExit("/healthz did not satisfy the Yarqa contract")

          try:
              urllib.request.urlopen("http://127.0.0.1:7860/definitely-missing", timeout=3)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              raise SystemExit("unknown route did not return 404")
          PY
          for _ in $(seq 1 45); do
            status="$(docker inspect -f '{{.State.Health.Status}}' "$name")"
            if [ "$status" = healthy ]; then
              break
            fi
            if [ "$status" = unhealthy ]; then
              docker logs "$name"
              exit 1
            fi
            sleep 1
          done
          test "$(docker inspect -f '{{.State.Health.Status}}' "$name")" = healthy
